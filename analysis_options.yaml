include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Prefer const constructors
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_const_declarations: true
    
    # Prefer final variables
    prefer_final_fields: true
    prefer_final_locals: true
    
    # Prefer single quotes
    prefer_single_quotes: true
    
    # Prefer relative imports
    prefer_relative_imports: true
    
    # Avoid unnecessary containers
    avoid_unnecessary_containers: true
    
    # Prefer sized box for sizing
    sized_box_for_whitespace: true
    
    # Prefer expression function bodies
    prefer_expression_function_bodies: true
    
    # Prefer collection if
    prefer_collection_literals: true
    
    # Prefer conditional expressions
    prefer_conditional_expressions: true
    
    # Prefer if null operators
    prefer_if_null_operators: true
    
    # Prefer null aware operators
    prefer_null_aware_operators: true
    
    # Prefer spread collections
    prefer_spread_collections: true
    
    # Prefer foreach
    prefer_foreach: true
    
    # Prefer iterable whereType
    prefer_iterable_whereType: true
    
    # Prefer map from entries
    prefer_map_from_entries: true
    
    # Prefer set literals
    prefer_set_literals: true
    
    # Prefer string interpolation
    prefer_string_interpolation: true
    
    # Prefer string literals
    prefer_string_literals: true
    
    # Prefer trailing commas
    prefer_trailing_commas: true
    
    # Prefer void to null
    prefer_void_to_null: true
    
    # Sort child properties last
    sort_child_properties_last: true
    
    # Sort constructors first
    sort_constructors_first: true
    
    # Sort pub dependencies
    sort_pub_dependencies: true
    
    # Use key in widget constructors
    use_key_in_widget_constructors: true
    
    # Use super parameters
    use_super_parameters: true

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    invalid_annotation_target: ignore